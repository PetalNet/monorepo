packages:
  - apps/*
  - packages/*
  - tools/*

# Why: every dependency version must come from a catalog. `pnpm add` routes new
# deps into a catalog automatically and refuses to introduce a divergent range.
catalogMode: strict

# Why exclude: the supply-chain age gate stays on for everything except a
# handful of brand-new releases we want today for CI signal (eslint 10
# major dropped <12h ago, etc.). Drop these once their default 7-day age
# elapses.
minimumReleaseAgeExclude:
  - eslint
  - "@eslint/plugin-kit"
  - "@eslint/json"
  - "@eslint/markdown"
  - svelte
  - knip

# Why: pnpm 11 sandboxes post-install scripts by default; these have legitimate
# native-binding or codegen needs.
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  # Source-map upload CLI only; runtime error capture works without its binary.
  "@sentry/cli": false
  better-sqlite3: true
  esbuild: true
  prisma: true

catalogs:
  dev:
    "@playwright/test": ^1.61.1
    "@eslint/js": ^10.0.1
    "@eslint/json": ^2.0.0
    "@eslint/markdown": ^8.0.2
    "@manypkg/cli": ^0.25.1
    "@sveltejs/adapter-node": ^5.5.2
    "@sveltejs/vite-plugin-svelte": ^7.0.0
    "@tailwindcss/vite": ^4.1.18
    autoprefixer: ^10.4.20
    drizzle-kit: ^0.31.8
    eslint: ^10.4.1
    eslint-plugin-oxlint: ^1.67.0
    eslint-plugin-package-json: ^1.2.0
    knip: ^6.16.1
    oxlint: ^1.67.0
    postcss: ^8.4.49
    prisma: ^5.22.0
    svelte-check: ^4.3.5
    typescript: ^6.0.3
    typescript-eslint: ^8.60.0
    typesync: ^0.14.3
    update-ts-references: ^6.0.0
    vite: ^8.0.0
    vitest: ^3.2.4
    # Exact-pinned (not ^) so it stays in lockstep with the CI-installed vp
    # (.github/workflows/ci.yml setup-vp version). Renovate bumps both together.
    vite-plus: 0.2.4

  types:
    "@types/bcryptjs": ^2.4.6
    "@types/leaflet": ^1.9.21
    "@types/leaflet.heat": ^0.2.5
    "@types/leaflet.markercluster": ^1.5.6
    "@types/node": ^25.9.1
    "@types/qrcode": ^1.5.5
    "@types/sortablejs": ^1.15.8

  prod:
    "@fastify/cors": ^11.3.0
    "@fastify/websocket": ^11.2.0
    "@fontsource/geist-mono": ^5.2.8
    "@fontsource/geist-sans": ^5.2.5
    "@libsql/client": ^0.17.0
    "@lucide/svelte": ^1.23.0
    "@modelcontextprotocol/sdk": ^1.29.0
    "@prisma/client": ^5.22.0
    "@sentry/node": ^10.63.0
    "@sentry/sveltekit": ^10.63.0
    "@sveltejs/kit": ^2.50.1
    bcryptjs: ^2.4.3
    daisyui: ^5.6.13
    date-fns: ^4.1.0
    drizzle-orm: ^0.45.1
    fastify: ^5.6.1
    leaflet: ^1.9.4
    leaflet-image: ^0.4.0
    leaflet.heat: ^0.2.0
    leaflet.markercluster: ^1.5.3
    nanoid: ^5.0.0
    postgres: ^3.4.7
    uuid: ^14.0.0
    qrcode: ^1.5.4
    sortablejs: ^1.15.6
    svelte: ^5.48.2
    tailwindcss: ^4.1.18
    zod: ^4.0.0

  # Apps still on Tailwind v3 (consolidated to latest v3); not upgraded to v4 yet.
  legacy:
    tailwindcss: ^3.4.17
