# Point home-server — production self-host stack.
#
#   Traefik (TLS termination + ACME)  ──►  point-server  ──►  Postgres
#
# This pulls the published server image from GHCR — no build toolchain needed on
# the host. To build from source instead (development), add the override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up
#
# First run:
#   1. cp .env.example .env  &&  edit it (DOMAIN, ACME_EMAIL, JWT_SECRET, passwords)
#   2. Point an A/AAAA record for $DOMAIN at this host (ports 80 + 443 open)
#   3. docker compose up -d
# Traefik obtains a Let's Encrypt cert for $DOMAIN automatically on first request.
#
# Don't want Traefik? Delete the `traefik` service + the point-server `labels:`
# block and put your own reverse proxy in front of point-server:8330 (it speaks
# plain HTTP by design — TLS is always terminated at the proxy).

services:
  traefik:
    image: traefik:v3.2
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all plain HTTP to HTTPS.
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:?set ACME_EMAIL in .env}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-acme:/acme
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-point}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-point}
    volumes:
      - point-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-point}"]
      interval: 5s
      timeout: 5s
      retries: 10

  point-server:
    image: ghcr.io/petalnet/point-server:${POINT_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-point}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-point}
      JWT_SECRET: ${JWT_SECRET:?set a 32+ char random JWT_SECRET in .env}
      DOMAIN: ${DOMAIN:?set DOMAIN to this server's public hostname in .env}
      PUBLIC_URL: ${PUBLIC_URL:-https://${DOMAIN}}
      OPEN_REGISTRATION: ${OPEN_REGISTRATION:-false}
      # Behind Traefik: honor the X-Real-Ip Traefik sets so rate limits key off
      # the real client, not the proxy. Drop this if you expose 8330 directly.
      TRUST_PROXY_HEADERS: "true"
      GLITCHTIP_DSN: ${GLITCHTIP_DSN:-}
      # Map tiers (optional; see docs/SELF-HOSTING.md "Maps"). TILES_URL is the
      # public template of the bundled tileserver (below); TILE_UPSTREAM makes
      # this server proxy a commercial provider for the convenient tier.
      TILES_URL: ${TILES_URL:-}
      TILE_UPSTREAM: ${TILE_UPSTREAM:-}
      LISTEN: 0.0.0.0:8330
    expose:
      - "8330"
    labels:
      - traefik.enable=true
      - traefik.http.routers.point.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.point.entrypoints=websecure
      - traefik.http.routers.point.tls.certresolver=le
      - traefik.http.services.point.loadbalancer.server.port=8330
    restart: unless-stopped

  # Optional self-hosted tileserver: the max-private map tier. The app renders
  # tiles straight from YOUR server; map data never touches a third party.
  # Enable with:  docker compose --profile tiles up -d
  # One-time setup (an area extract + label fonts) is three commands — see
  # docs/SELF-HOSTING.md "Maps". Then set in .env:
  #   TILES_URL=https://$DOMAIN/tiles/styles/point-dark/{z}/{x}/{y}.png
  tileserver:
    image: maptiler/tileserver-gl:v5.3.1
    profiles: ["tiles"]
    command: ["--config", "/data/config.json", "--public_url", "https://${DOMAIN}/tiles/"]
    volumes:
      - ./tileserver:/data:ro
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.point-tiles.rule=Host(`${DOMAIN}`) && PathPrefix(`/tiles/`)
      - traefik.http.routers.point-tiles.entrypoints=websecure
      - traefik.http.routers.point-tiles.tls.certresolver=le
      - traefik.http.middlewares.point-tiles-strip.stripprefix.prefixes=/tiles
      - traefik.http.routers.point-tiles.middlewares=point-tiles-strip
      - traefik.http.services.point-tiles.loadbalancer.server.port=8080

volumes:
  point-pgdata:
  traefik-acme:
