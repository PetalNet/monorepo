name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, build, test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: point
          POSTGRES_PASSWORD: point
          POSTGRES_DB: point_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U point"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://point:point@localhost:5432/point_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo build
        run: cargo build --workspace
      - name: cargo test
        run: cargo test --workspace

  flutter:
    name: Flutter (analyze, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for Flutter project
        id: check
        run: |
          if [ -f app/pubspec.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "app/ has no Flutter project yet (lands in M1) — skipping honestly."
          fi
      - uses: subosito/flutter-action@v2
        if: steps.check.outputs.present == 'true'
        with:
          channel: stable
      - name: flutter pub get
        if: steps.check.outputs.present == 'true'
        run: flutter pub get
        working-directory: app
      - name: flutter analyze
        if: steps.check.outputs.present == 'true'
        run: flutter analyze
        working-directory: app
      - name: flutter test
        if: steps.check.outputs.present == 'true'
        run: |
          if [ -d test ]; then flutter test; else echo "no tests yet"; fi
        working-directory: app
