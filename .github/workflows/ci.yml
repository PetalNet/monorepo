name: ci
on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          # Keep in lockstep with the vite-plus catalog pin (renovate-managed).
          # renovate: datasource=npm depName=vite-plus
          version: "0.1.24"
          cache: true
          node-version-file: package.json
          run-install: true
          sfw: true
      - run: vp run check
      - run: vp run manypkg
      - run: vp dedupe --check -- --prefer-offline
      - run: vp run typesync:check
      - run: vp run lint:knip
      - run: vp run lint:knip:prod

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:/tmp/build.db"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@2dec1e33f4ab2c6d5bce1b0c4607961bb1a3f7a1 # v1.12.0
        with:
          # Keep in lockstep with the vite-plus catalog pin (renovate-managed).
          # renovate: datasource=npm depName=vite-plus
          version: "0.1.24"
          cache: true
          node-version-file: package.json
          run-install: true
          sfw: true
      - name: Write app env
        run: echo "DATABASE_URL=$DATABASE_URL" > apps/collegemap/.env
      - run: vp run build

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: crate-ci/typos@37bb98842b0d8c4ffebdb75301a13db0267cef89 # v1.47.2

  link-check:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --cache --max-cache-age 1d .
          token: ${{ github.token }}
