name: ci
on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@329490fff19dd4ecd8ff2a74d7c45bee0448f3a6 # v1.11.0
        with:
          # Keep in lockstep with the vite-plus catalog pin (renovate-managed).
          # renovate: datasource=npm depName=vite-plus
          version: "0.1.24"
          cache: true
          node-version-file: package.json
          run-install: true
          sfw: true
      - run: vp run check
      - run: vp run manypkg
      - run: vp dedupe --check -- --prefer-offline
      - run: vp run typesync:check
      - run: vp run lint:knip
      - run: vp run lint:knip:prod

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:/tmp/build.db"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@329490fff19dd4ecd8ff2a74d7c45bee0448f3a6 # v1.11.0
        with:
          # Keep in lockstep with the vite-plus catalog pin (renovate-managed).
          # renovate: datasource=npm depName=vite-plus
          version: "0.1.24"
          cache: true
          node-version-file: package.json
          run-install: true
          sfw: true
      - name: Write app env
        run: echo "DATABASE_URL=$DATABASE_URL" > apps/collegemap/.env
      - run: vp run build

  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: crate-ci/typos@f8a58b6b53f2279f71eb605f03a4ae4d10608f45 # v1.47.0

  link-check:
    timeout-minutes: 2
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --cache --max-cache-age 1d .
          token: ${{ github.token }}
