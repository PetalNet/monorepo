[files]
extend-exclude = [
	"pnpm-lock.yaml",
	"**/dist/**",
	"**/build/**",
	"**/.svelte-kit/**",
	# University names/domains read as typos (DeVry, oru.edu, etc.).
	"apps/collegemap/src/lib/college*.ts",
	"apps/collegemap/src/lib/colleges.json",
	# Vendored design references (client UI spec + pixel-close mockup) — kept
	# byte-faithful to the gallery source, not our prose to correct.
	"apps/point/docs/design/**",
]

[default.extend-words]
# "mis-" prefix (e.g. mis-advertising) reads as a typo but is a valid English prefix.
mis = "mis"
# Proper nouns + identifiers that look like typos but aren't.
Hass = "Hass"
hass = "hass"
# Decision-log identifiers (BA1..BA9 in apps/box-agent/DECISIONS).
BA = "BA"
ba = "ba"
# svelte-effect-runtime's acronym, used across the console docs and briefs.
# Svelte Effect Runtime (deliberate acronym, not a typo for SET).
SER = "SER"
